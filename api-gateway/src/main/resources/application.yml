server:
  port: 8080 # Taking over the monolith's port to preserve frontend connections

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: staybite-backend
          uri: lb://STAYBITE-BACKEND
          predicates:
            - Path=/api/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
